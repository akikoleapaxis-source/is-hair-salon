backend:
  name: git-gateway
  branch: main

media_folder: "client/public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "News"
    folder: "client/src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Image", name: "image", widget: "image", required: false}

  - name: "staff"
    label: "Staff"
    folder: "client/src/content/staff"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "title", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Instagram", name: "instagram", widget: "string", required: false}
      - {label: "Bio", name: "body", widget: "markdown", required: false}

  - name: "menu"
    label: "Menu"
    folder: "client/src/content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Category Name", name: "title", widget: "string"}
      - {label: "Order", name: "order", widget: "number", default: 0}
      - label: "Items"
        name: "items"
        widget: "list"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Price", name: "price", widget: "string"}
          - {label: "Duration", name: "duration", widget: "string", required: false}
          - {label: "Description", name: "description", widget: "text", required: false}
